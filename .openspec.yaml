project:
  name: api-scheduler-flow-engine
  description: >
    API Scheduler yang memungkinkan user mendefinisikan urutan eksekusi (flow)
    dan menjalankan workflow secara otomatis maupun manual.
  version: 1.0.0

product:
  goals:
    - Dynamic workflow execution berbasis urutan step
    - Mendukung automation deployment & task orchestration
    - Monitoring dan logging eksekusi secara detail

  personas:
    - name: Admin
      needs:
        - Mengelola flow
        - Monitoring execution
        - Mengatur scheduler
    - name: Developer
      needs:
        - Trigger execution via API
        - Melihat hasil eksekusi

features:
  - name: Flow Management
    description: CRUD flow dengan definisi step berbasis JSON
  - name: Execution Engine
    description: Engine untuk menjalankan flow step-by-step
  - name: Scheduler
    description: Menjalankan flow berdasarkan cron expression
  - name: Monitoring
    description: Tracking status dan log eksekusi
  - name: Retry & Failure Handling
    description: Konfigurasi retry dan error handling

architecture:
  style: clean-architecture

  layers:
    - name: presentation
      responsibilities:
        - REST API
        - Request validation

    - name: application
      responsibilities:
        - Flow orchestration
        - Execution logic
        - Scheduler service

    - name: domain
      responsibilities:
        - Entity definition
        - Business rules

    - name: infrastructure
      responsibilities:
        - Database access
        - External service
        - Queue system

tech_stack:
  language: golang
  framework: gin
  database: postgresql
  scheduler: robfig/cron
  orm: gorm
  queue: redis

domain:
  entities:
    - name: Flow
      fields:
        - id: uuid
        - name: string
        - definition: json
        - created_at: datetime

    - name: Step
      fields:
        - id: uuid
        - flow_id: uuid
        - order: integer
        - action: string
        - config: json

    - name: Execution
      fields:
        - id: uuid
        - flow_id: uuid
        - status: string
        - started_at: datetime
        - finished_at: datetime

    - name: ExecutionStep
      fields:
        - id: uuid
        - execution_id: uuid
        - step_order: integer
        - status: string
        - log: text
        - started_at: datetime
        - finished_at: datetime

api:
  base_path: /api/v1

  endpoints:
    - method: POST
      path: /flows
      name: createFlow

    - method: GET
      path: /flows/{id}
      name: getFlow

    - method: GET
      path: /flows
      name: listFlows

    - method: PUT
      path: /flows/{id}
      name: updateFlow

    - method: DELETE
      path: /flows/{id}
      name: deleteFlow

    - method: POST
      path: /flows/{id}/execute
      name: executeFlow

    - method: GET
      path: /executions/{id}
      name: getExecutionStatus

    - method: GET
      path: /executions
      name: listExecutions

    - method: POST
      path: /flows/{id}/schedule
      name: scheduleFlow

execution:
  strategy: sequential

  options:
    retry:
      enabled: true
      retry: 3
      delay_seconds: 5

    failure_policy:
      type: stop   # stop | continue

    timeout_seconds: 300

actions:
  registry:
    - name: git_pull
    - name: build
    - name: test
    - name: deploy
    - name: run_script
    - name: docker_build
    - name: docker_push

scheduler:
  library: robfig/cron
  timezone: Asia/Jakarta

  capabilities:
    - cron_expression
    - start_stop_job
    - dynamic_job_registration

security:
  auth:
    type: jwt

  roles:
    - ADMIN
    - USER

non_functional:
  concurrency:
    worker_pool: true
    max_workers: 10

  logging:
    structured: true

  reliability:
    retry: true

future_scope:
  - Parallel execution (DAG)
  - Visual flow builder
  - Webhook integration
  - Notification system
  - Flow versioning

tasks:
  - Setup Go Module & Project Structure
  - Setup Gin Server
  - Implement Flow CRUD
  - Implement Execution Engine
  - Implement Action Handler
  - Integrate Cron Scheduler
  - Implement Worker Pool
  - Logging & Monitoring
  - Unit Testing
  - Dockerize Application