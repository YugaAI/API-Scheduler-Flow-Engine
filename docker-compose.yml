services:
  db:
    restart: unless-stopped
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      # Bind ke localhost only — jangan expose ke public interface
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - GIN_MODE=release
      - SERVER_PORT=8080
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgrespassword
      - DB_NAME=flow_engine
      - DB_SSL_MODE=disable
      - REDIS_URL=redis:6379
      - JWT_SECRET=aAFSmO5lDRkWiXj/MjE+KiLdoOjBdxFbHvUwI1gZ7OIH2zzMjTGT3CHkxTzSO8Hr0RaS7nqX/8TjHdYYFtwDHQ==
      - WORKER_POOL_SIZE=10
      - TIMEZONE=Asia/Jakarta
      - LOG_LEVEL=info
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/xylo/apps:/workspace

    depends_on:
      db:
        condition: service_healthy
      redis:
        - condition: service_healthy
        - condition: service_healthy

    logging:
      driver: journald
      options:
        tag: "api-scheduler-flow-engine-app"

volumes:
  postgres_data:
  redis_data:
